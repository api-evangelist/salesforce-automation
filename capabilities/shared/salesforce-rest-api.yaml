naftiko: "1.0.0-alpha1"

info:
  label: "Salesforce REST API"
  description: "Core REST API for CRUD operations, SOQL queries, SOSL searches, and access to org-level resources."
  tags:
    - Salesforce
    - REST
    - CRM
    - Data
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SALESFORCE_ACCESS_TOKEN: SALESFORCE_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: salesforce-rest
      baseUri: https://yourInstance.salesforce.com/services/data/v63.0
      description: "Salesforce REST API for data operations."
      authentication:
        type: bearer
        token: "{{SALESFORCE_ACCESS_TOKEN}}"
      resources:
        - name: sobjects
          path: /sobjects
          description: "SObject operations including describe, CRUD, and metadata."
          operations:
            - name: describe-global
              method: GET
              description: "Describe all available SObjects."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-record
              method: POST
              description: "Create a new SObject record."
              inputParameters:
                - name: sObjectName
                  in: path
                  type: string
                  required: true
                  description: "SObject type name."
              body:
                type: json
                data:
                  fieldName: "{{tools.fieldValue}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: query
          path: /query
          description: "SOQL query execution."
          operations:
            - name: execute-query
              method: GET
              description: "Execute a SOQL query."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "SOQL query string."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: search
          path: /search
          description: "SOSL search execution."
          operations:
            - name: execute-search
              method: GET
              description: "Execute a SOSL search."
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "SOSL search string."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: approvals
          path: /process/approvals
          description: "Approval process operations."
          operations:
            - name: list-approvals
              method: GET
              description: "List approval processes."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: submit-approval
              method: POST
              description: "Submit an approval request."
              body:
                type: json
                data:
                  requests: "{{tools.requests}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: salesforce-rest-api
      resources:
        - path: /v1/sobjects
          name: sobjects
          description: "SObject operations."
          operations:
            - method: GET
              name: describe-global
              description: "Describe all SObjects."
              call: "salesforce-rest.describe-global"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: salesforce-rest-mcp
      transport: http
      tools:
        - name: describe-all-sobjects
          description: "Describe all available SObjects in the Salesforce org."
          hints:
            readOnly: true
            idempotent: true
          call: "salesforce-rest.describe-global"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-sobject-record
          description: "Create a new SObject record."
          hints:
            readOnly: false
          call: "salesforce-rest.create-record"
          with:
            sObjectName: "tools.sObjectName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: execute-soql-query
          description: "Execute a SOQL query against Salesforce data."
          hints:
            readOnly: true
            idempotent: true
          call: "salesforce-rest.execute-query"
          with:
            q: "tools.q"
          outputParameters:
            - type: object
              mapping: "$."
        - name: execute-sosl-search
          description: "Execute a SOSL search across Salesforce objects."
          hints:
            readOnly: true
            idempotent: true
          call: "salesforce-rest.execute-search"
          with:
            q: "tools.q"
          outputParameters:
            - type: object
              mapping: "$."
        - name: submit-approval-request
          description: "Submit a record for approval."
          hints:
            readOnly: false
          call: "salesforce-rest.submit-approval"
          with:
            requests: "tools.requests"
          outputParameters:
            - type: object
              mapping: "$."
