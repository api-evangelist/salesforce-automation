specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Salesforce Automation
providerId: salesforce-automation
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - CRM
  - Automation
  - B2B
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shape for Salesforce-driven automation: edition-based per-user-per-month
  subscription with API consumption bounded by a per-org 24-hour allowance and Apex governor limits. The
  financial unit of consumption is the licensed user, not the API request, though API headroom can become
  the binding constraint for automation-heavy orgs.'
sources:
  - https://developer.salesforce.com/docs/atlas.en-us.api_rest.meta/api_rest/
  - https://developer.salesforce.com/docs/atlas.en-us.salesforce_app_limits_cheatsheet.meta/salesforce_app_limits_cheatsheet/salesforce_app_limits_platform_api.htm
notes: Per-edition prices and per-edition API allowance numbers were not retrievable for this run. The
  FinOps shape below describes the structure rather than fabricated dollar values.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Salesforce, Inc.
serviceCategory: CRM / Automation
billingModel:
  pricingCategory: Subscription / Contact Sales
  billingFrequency: Monthly or Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Salesforce
  ServiceCategory: CRM
  ProviderName: Salesforce
  PublisherName: Salesforce, Inc.
  InvoiceIssuerName: Salesforce, Inc.
  BillingCurrency: USD
meters:
  - name: licensed_users
    unit: seat
    aggregation: max
    dimensions:
      - edition
      - cloud
  - name: api_requests_24h
    unit: request
    aggregation: sum
    dimensions:
      - org
      - api_family
  - name: apex_executions
    unit: transaction
    aggregation: sum
    dimensions:
      - org
      - class
principles:
  - name: Visibility
    description: Use the API Usage Last 7 Days report and System Overview page in Setup to track per-org
      API consumption against the 24-hour allowance; correlate with Apex CPU and DML governor metrics
      via Event Monitoring.
  - name: Allocation
    description: Allocate seat cost by org and business unit; allocate API headroom cost back to the integrations
      and Flow / Apex automations consuming the bucket so noisy integrations don't crowd out user-facing
      flows.
  - name: Optimization
    description: Move bulk loads to Bulk API; bulkify Apex; consolidate poll-based integrations onto Pub/Sub
      / Streaming; avoid per-record automation that fans out into callouts; right-size license counts
      and editions at renewal.
  - name: Accountability
    description: Salesforce admin / CoE owns license + API consumption with finance. Surface API usage
      headroom to integration owners; trigger reviews when sustained 24-hour consumption exceeds an internal
      threshold (commonly 60-70% of allowance).
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
