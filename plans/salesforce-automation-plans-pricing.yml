specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Salesforce Automation
providerId: salesforce-automation
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Automation
  - CRM
  - Enterprise
  - Sales
  - B2B
description: 'Salesforce Automation in this repo aggregates Salesforce REST / Bulk / Streaming / Tooling
  / Apex APIs used to drive process and workflow automation. Salesforce sells these capabilities through
  per-user-per-month editions of Sales Cloud, Service Cloud, Platform, and Industry clouds rather than
  via a standalone API price list. API request limits ride along with the org edition / license count.
  Salesforce''s public marketing pages were not retrievable for this run, so per-edition prices are not
  fabricated below.'
sources:
  - https://developer.salesforce.com/docs/atlas.en-us.api_rest.meta/api_rest/
  - https://www.salesforce.com/editions-pricing/sales-cloud/
notes: Salesforce.com pricing pages return 403 to scraping; per-edition list prices and exact API request
  caps could not be verified in this run. Real prices vary by region, contract size, and add-on mix and
  are negotiated through Salesforce sales / partners. This artifact is intentionally a single Contact
  Sales plan rather than a fabricated tier breakdown.
plans:
  - id: salesforce-automation-contact-sales
    name: Contact Sales
    type: enterprise
    description: Salesforce edition subscription (Sales / Service / Platform / Industry cloud) including
      access to REST, Bulk, Streaming, and Tooling APIs for automation. Per-user-per-month pricing varies
      by edition and is set by Salesforce sales.
    entries:
      - label: Edition Subscription
        name: edition_subscription
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Salesforce REST API access
      - name: Salesforce Bulk API access
      - name: Streaming / Pub-Sub API access
      - name: Tooling and Apex APIs
      - name: Flow / Process Builder automation
      - name: Per-org daily API request allowance scaled by edition and license count
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
